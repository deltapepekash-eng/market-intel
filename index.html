<!DOCTYPE html>
<html>
<head>
  <title>News Tracker</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    a {
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>📈 Live Market News</h2>

<div id="feedItems">Loading...</div>

<script>
async function loadNews() {
  try {
    const res = await fetch('data.json?_t=' + Date.now());
    const data = await res.json();

    const container = document.getElementById('feedItems');

    container.innerHTML = data.map(item => `
      <div class="card">
        <a href="${item.link}" target="_blank">${item.title}</a>
      </div>
    `).join('');

  } catch (e) {
    document.getElementById('feedItems').innerHTML = "Error loading news";
  }
}

loadNews();
</script>

</body>
</html>
