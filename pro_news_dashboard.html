<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro News Dashboard</title>

<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#1e293b;color:#fff;padding:12px;text-align:center;font-size:18px}
.tabs{display:flex;justify-content:space-around;background:#fff;border-bottom:1px solid #ccc}
.tab{padding:10px;cursor:pointer;font-size:14px}
.tab.active{color:#2563eb;font-weight:bold}
.container{padding:10px;max-width:1000px;margin:auto}
.card{background:#fff;padding:12px;margin:8px 0;border-radius:10px;cursor:pointer;border:1px solid #ddd}
.title{font-weight:bold;margin-bottom:5px}
.meta{font-size:12px;color:#666;display:flex;justify-content:space-between}
@media(max-width:600px){
  .tabs{font-size:12px}
}
</style>
</head>

<body>

<header>Pro News Dashboard</header>

<div class="tabs">
<div class="tab active" onclick="showTab('news')">News</div>
<div class="tab" onclick="showTab('trending')">Trending</div>
<div class="tab" onclick="showTab('intel')">Intel</div>
<div class="tab" onclick="showTab('exchange')">Exchange</div>
</div>

<div class="container">
<div id="content"></div>
</div>

<script>
let allNews=[];

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');

  if(tab==='news') render(allNews);
  if(tab==='trending') render(allNews.slice(0,10));
  if(tab==='intel') render(allNews.filter(n=>n.title.length>80));
  if(tab==='exchange') render(allNews.filter(n=>n.title.toLowerCase().includes('stock')));
}

function render(list){
  const c=document.getElementById('content');
  if(!list.length){c.innerHTML="Loading...";return;}
  c.innerHTML=list.map(n=>`
    <div class="card" onclick="openLink('${n.link}')">
      <div class="title">${n.title}</div>
      <div class="meta">
        <span>${n.source}</span>
        <span>${n.time}</span>
      </div>
    </div>
  `).join("");
}

function openLink(link){
  if(!link) link="https://news.google.com";
  window.open(link,"_blank");
}

async function load(){
  const url="https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en";
  const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url);

  const res=await fetch(proxy);
  const text=await res.text();
  const xml=new DOMParser().parseFromString(text,"text/xml");

  const items=[...xml.querySelectorAll("item")];

  allNews=items.map(it=>{
    return {
      title:it.querySelector("title").textContent,
      link:it.querySelector("link").textContent,
      source:"Google News",
      time:new Date(it.querySelector("pubDate").textContent).toLocaleTimeString()
    }
  });

  render(allNews);
}

load();
</script>

</body>
</html>
