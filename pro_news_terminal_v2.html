<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro News Terminal</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:#e2e8f0}
header{padding:12px;text-align:center;background:#020617;font-size:18px}
.tabs{display:flex;justify-content:space-around;background:#020617;border-bottom:1px solid #334155}
.tab{padding:10px;cursor:pointer}
.tab.active{color:#38bdf8;font-weight:bold}
.container{padding:10px;max-width:1000px;margin:auto}
.card{background:#020617;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #334155;cursor:pointer}
.title{font-weight:bold;margin-bottom:5px}
.meta{font-size:12px;color:#94a3b8;display:flex;justify-content:space-between}
.badge{font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px}
.bull{background:#065f46}
.bear{background:#7f1d1d}
</style>
</head>

<body>

<header>📊 Pro News Terminal</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('news',this)">News</div>
<div class="tab" onclick="switchTab('trending',this)">Trending</div>
<div class="tab" onclick="switchTab('intel',this)">Intel</div>
<div class="tab" onclick="switchTab('exchange',this)">Exchange</div>
</div>

<div class="container">
<div id="content">Loading...</div>
</div>

<script>
let allNews=[];

function switchTab(tab,el){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');

 if(tab==='news') render(allNews);
 if(tab==='trending') render(allNews.slice(0,15));
 if(tab==='intel') render(allNews.filter(n=>n.title.length>60));
 if(tab==='exchange') render(allNews.filter(n=>isExchange(n)));
}

function isExchange(n){
 return /nse|bse|stock|shares|ipo|results/i.test(n.title);
}

function sentiment(title){
 if(/gain|rise|profit|up|surge/i.test(title)) return "bull";
 if(/fall|loss|down|drop/i.test(title)) return "bear";
 return "";
}

function render(list){
 const c=document.getElementById("content");
 if(!list.length){c.innerHTML="No data. Try refresh.";return;}

 c.innerHTML=list.map(n=>{
   const s=sentiment(n.title);
   return `
   <div class="card" onclick="openLink('${n.link}')">
     <div class="title">
       ${n.title}
       ${s?`<span class="badge ${s}">${s.toUpperCase()}</span>`:''}
     </div>
     <div class="meta">
       <span>${n.source}</span>
       <span>${n.time}</span>
     </div>
   </div>`;
 }).join("");
}

function openLink(link){
 if(!link) link="https://news.google.com";
 window.open(link,"_blank");
}

async function load(){
 try{
   const url="https://news.google.com/rss?hl=en-IN&gl=IN&ceid=IN:en";
   const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url);

   const res=await fetch(proxy);
   const text=await res.text();
   const xml=new DOMParser().parseFromString(text,"text/xml");

   const items=[...xml.querySelectorAll("item")];

   allNews=items.map(it=>{
     return {
       title:it.querySelector("title").textContent,
       link:it.querySelector("link").textContent,
       source:"Google News",
       time:new Date(it.querySelector("pubDate").textContent).toLocaleTimeString()
     }
   });

   render(allNews);

 }catch(e){
   document.getElementById("content").innerHTML="Failed to load. Check internet or host via GitHub Pages.";
 }
}

load();
</script>

</body>
</html>
